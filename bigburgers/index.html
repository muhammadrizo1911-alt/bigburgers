<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIG BURGERS  ── Restoran, Yoqimli, Sifatli, Halol </title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="img/bigburgers.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <!-- HEADER -->
    <header>
        <a href="#" class="logo">
            <span>BIG BURGERS</span>
        </a>
        <div class="right-section">
            <button class="cart-btn" onclick="openCart()">
                <span class="cart-icon">🛒</span>
                <span class="cart-count">0</span>
            </button>
            <div class="profile-menu">
                <button class="profile-btn" onclick="toggleProfileMenu()">
                    <span class="profile-icon">👤</span>
                    <span>Profil</span>
                </button>
                <div class="profile-dropdown" id="profileDropdown">
                    <a href="#" class="dropdown-item">📋 Mening buyurtmalarim</a>
                    <a href="#" class="dropdown-item">❤️ Sevimlilar</a>
                    <a href="#" class="dropdown-item">⚙️ Sozlamalar</a>
                    <a href="#" class="dropdown-item">🚪 Chiqish</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content with top padding -->
    <div class="pt-8 px-4">
        <!-- Horizontal Scroll Categories -->
        <div class="overflow-x-auto pb-6 hide-scrollbar">
            <div class="flex gap-3 min-w-max">
            <!-- Active category -->
            <button onclick="selectCategory(this)" 
                    class="category-card active-nav flex-shrink-0 bg-white shadow-md rounded-3xl px-6 py-4 flex items-center gap-x-3 border-2 border-orange-400">
                <div class="w-12 h-12 image-placeholder rounded-2xl flex items-center justify-center text-4xl shadow-inner">🛒</div>
                <div class="text-left">
                    <span class="block text-orange-600 font-bold text-lg">Yangilar</span>
                    <span class="text-xs text-orange-400">4 ta yangi</span>
                </div>
            </button>
            
            <!-- Other categories -->
            <button onclick="selectCategory(this)" 
                    class="category-card flex-shrink-0 bg-white shadow-md rounded-3xl px-6 py-4 flex items-center gap-x-3">
                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🍔</div>
                <div class="text-left">
                    <span class="block text-gray-700 font-medium text-lg">Ganburgerlar</span>
                </div>
            </button>
            
            <button onclick="selectCategory(this)" 
                    class="category-card flex-shrink-0 bg-white shadow-md rounded-3xl px-6 py-4 flex items-center gap-x-3">
                <div class="w-12 h-12 bg-red-100 text-red-600 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🍕</div>
                <div class="text-left">
                    <span class="block text-gray-700 font-medium text-lg">Burgerlar</span>
                </div>
            </button>
            
            <button onclick="selectCategory(this)" 
                    class="category-card flex-shrink-0 bg-white shadow-md rounded-3xl px-6 py-4 flex items-center gap-x-3">
                <div class="w-12 h-12 bg-yellow-100 text-yellow-600 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🌭</div>
                <div class="text-left">
                    <span class="block text-gray-700 font-medium text-lg">Hot-Doklar</span>
                </div>
            </button>
            
            <button onclick="selectCategory(this)" 
                    class="category-card flex-shrink-0 bg-white shadow-md rounded-3xl px-6 py-4 flex items-center gap-x-3">
                <div class="w-12 h-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🥪</div>
                <div class="text-left">
                    <span class="block text-gray-700 font-medium text-lg">Sendvichlar</span>
                </div>
            </button>
        </div>
    </div>

        <!-- Category Grid -->
        <div id="categoryGrid" class="grid grid-cols-2 md:grid-cols-3 gap-6 mt-8">
        <!-- Will be populated by JS -->
        </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
